influxdb:
  url: ${INFLUXDB_HOST}
  token: ${INFLUXDB_TOKEN}
  org: ${INFLUXDB_ORG}
  bucket: ${INFLUXDB_BUCKET}

tickers:
  - AAPL
  - AMD
  - AMGN
  - AMZN
  - ASML
  - AVGO
  - AXP
  - CAT
  - CMG
  - COIN
  - COST
  - CSCO
  - CVNA
  - DFS
  - DG
  - DIS
  - DOCN
  - ECL
  - ETSY
  - GME
  - GOOGL
  - HD
  - HIMS
  - LLY
  - LMT
  - MCD
  - MELI
  - META
  - MSFT
  - NET
  - NFLX
  - NOW
  - NVDA
  - NVO
  - OC
  - OKLO
  - PANW
  - PFE
  - PHM
  - PLTR
  - QCOM
  - QQQ
  - QQQM
  - REGN
  - RYAAY
  - SBUX
  - SCHD
  - SHOP
  - SNY
  - SOFI
  - SYK
  - TMUS
  - TSLA
  - TSM
  - UBER
  - UI
  - ULTA
  - V
  - VOO
  - VUG
  - WMT
  - XLV
  - XOM
settings:
  interval_minutes: 30
  delay_between_tickers: 2
  history_period: "1y"

plugins:
  - name: eodhd
    version: 1.0.0
    enabled: false
    args:
      api_key: ${EODHD_API_TOKEN}
      exchange: US
      delay_between_tickers: 1.5
      # Uses global tickers list if not specified here
      # tickers: [AAPL, MSFT]
      # Uses global influxdb config if not specified here;
      # override to write to a separate bucket:
      # influxdb:
      #   url: ${INFLUXDB_HOST}
      #   token: ${INFLUXDB_TOKEN}
      #   org: ${INFLUXDB_ORG}
      #   bucket: ${INFLUXDB_EODHD_BUCKET}
